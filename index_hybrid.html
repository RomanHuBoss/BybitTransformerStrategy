<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quant ML Hybrid Signals (V4.0)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .tile {
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }
        .long { background: #2ecc71; color: #000; }
        .short { background: #e74c3c; color: #000; }
        .neutral { background: #7f8c8d; }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1 class="header">Quant ML V4.0 Hybrid Signals</h1>
    <div class="grid" id="grid"></div>

    <script>
        async function loadSnapshot() {
            try {
                const res = await fetch("/snapshot");
                const data = await res.json();
                renderTiles(data);
            } catch (e) {
                console.error("Ошибка загрузки:", e);
            }
        }

        function renderTiles(snapshot) {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            for (const symbol in snapshot) {
                if (symbol === "timestamp") continue;

                const signal = snapshot[symbol];
                const classMap = { 0: "short", 1: "neutral", 2: "long" };
                const tile = document.createElement("div");
                tile.className = `tile ${classMap[signal.final_class]}`;

                const amplitude = (signal.predicted_amplitude * 100).toFixed(2);
                const confidence = (signal.final_confidence * 100).toFixed(1);

                tile.innerHTML = `
                    <strong>${symbol}</strong><br>
                    Amp: ${amplitude}%<br>
                    Conf: ${confidence}%
                `;

                tile.onclick = () => {
                    alert(`${symbol}\n\nClass: ${signal.final_class}\nConfidence: ${confidence}%\nAmplitude: ${amplitude}%`);
                };

                grid.appendChild(tile);
            }
        }

        loadSnapshot();
        setInterval(loadSnapshot, 60_000); // Обновлять каждые 60 сек
    </script>
</body>
</html>
